<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Upload & Processing</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 24px;
            max-width: 760px;
            line-height: 1.6;
            color: #222;
            background: #fafafa;
        }
        
        h1 {
            margin-bottom: 8px;
            font-size: 2rem;
        }
        
        p {
            margin: 0 0 20px;
            color: #444;
        }
        
        label {
            display: block;
            margin: 16px 0 8px;
            font-weight: 600;
        }
        
        input[type="file"] {
            display: block;
            margin-bottom: 12px;
        }
        
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            color: white;
            background: #0066cc;
            cursor: pointer;
            font-size: 0.96rem;
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            background: #ffffff;
            border: 1px solid #ddd;
            min-height: 72px;
            white-space: pre-wrap;
            color: #1a1a1a;
        }
        
        .result {
            margin-top: 16px;
            padding: 16px;
            border-radius: 10px;
            background: #f4f8ff;
            border: 1px solid #cddbf7;
        }
    </style>
</head>

<body>
    <h1>File Upload & Processing</h1>
    <p>Select a file, click Upload, and watch the status updates while the file is being processed.</p>

    <label for="fileInput">Choose file</label>
    <input id="fileInput" type="file" accept=".txt,.md,.json,.csv" />

    <button id="uploadBtn" type="button">Upload and Process</button>

    <div class="status" id="status">Status: ready</div>
    <div class="result" id="result" hidden></div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const statusBox = document.getElementById('status');
        const resultBox = document.getElementById('result');

        function updateStatus(message) {
            statusBox.textContent = message;
        }

        function showResult(message) {
            resultBox.textContent = message;
            resultBox.hidden = false;
        }

        async function uploadAndProcess() {
            const file = fileInput.files[0];
            if (!file) {
                updateStatus('Please select a file before uploading.');
                return;
            }

            uploadBtn.disabled = true;
            updateStatus('Uploading file...');
            resultBox.hidden = true;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData,
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    updateStatus('Upload failed: ' + (errorText || response.statusText));
                    return;
                }

                updateStatus('File uploaded. Processing...');

                const result = await response.json();
                if (result.error) {
                    updateStatus('Processing failed: ' + result.error);
                } else {
                    updateStatus('Processing complete.');
                    showResult(result.message || JSON.stringify(result, null, 2));
                }
            } catch (error) {
                updateStatus('Error: ' + error.message);
            } finally {
                uploadBtn.disabled = false;
            }
        }

        uploadBtn.addEventListener('click', uploadAndProcess);
    </script>
</body>

</html>
