<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session Manager UI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 24px;
            max-width: 820px;
            line-height: 1.5;
            color: #222;
        }
        
        h1 {
            margin-bottom: 8px;
            font-size: 1.8rem;
        }
        
        label {
            display: block;
            margin: 16px 0 4px;
            font-weight: 600;
        }
        
        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95rem;
            box-sizing: border-box;
        }
        
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .button-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 18px;
            border: none;
            border-radius: 6px;
            color: white;
            background: #0078d4;
            cursor: pointer;
            font-size: 0.95rem;
        }
        
        button.secondary {
            background: #5a5a5a;
        }
        
        button:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }
        
        .status {
            margin-top: 18px;
            padding: 14px 16px;
            background: #f4f4f4;
            border-radius: 8px;
            min-height: 48px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <h1>Text Analyzer Session Manager</h1>
    <p>Enter your session data and use the buttons below to save or load JSON session files.</p>

    <label for="filename">File name</label>
    <input id="filename" type="text" placeholder="session1.json" value="session1.json" />

    <label for="originalText">Original text</label>
    <textarea id="originalText" placeholder="Paste the original text here..."></textarea>

    <label for="summary">Summary</label>
    <textarea id="summary" placeholder="Enter the summary here..."></textarea>

    <label for="settings">Settings</label>
    <textarea id="settings" placeholder="Enter session settings as JSON or plain text..."></textarea>

    <div class="button-row">
        <button id="saveBtn" type="button">Save session</button>
        <button id="loadBtn" class="secondary" type="button">Load session</button>
    </div>

    <div class="status" id="status">Status: ready</div>

    <script>
        const filenameInput = document.getElementById('filename');
        const originalTextInput = document.getElementById('originalText');
        const summaryInput = document.getElementById('summary');
        const settingsInput = document.getElementById('settings');
        const statusBox = document.getElementById('status');
        const saveBtn = document.getElementById('saveBtn');
        const loadBtn = document.getElementById('loadBtn');

        function updateStatus(message) {
            statusBox.textContent = message;
        }

        async function saveSession() {
            const filename = filenameInput.value.trim();
            if (!filename) {
                updateStatus('Please enter a file name before saving.');
                return;
            }

            const payload = {
                filename,
                data: {
                    original_text: originalTextInput.value,
                    summary: summaryInput.value,
                    settings: settingsInput.value,
                },
            };

            updateStatus('Saving session...');
            try {
                const response = await fetch('/save_session', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload),
                });

                const result = await response.json();
                if (response.ok) {
                    updateStatus('Saved successfully: ' + result.message);
                } else {
                    updateStatus('Save failed: ' + (result.error || response.statusText));
                }
            } catch (error) {
                updateStatus('Save error: ' + error.message);
            }
        }

        async function loadSession() {
            const filename = filenameInput.value.trim();
            if (!filename) {
                updateStatus('Please enter a file name before loading.');
                return;
            }

            updateStatus('Loading session...');
            try {
                const response = await fetch('/load_session', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        filename
                    }),
                });

                const result = await response.json();
                if (response.ok) {
                    originalTextInput.value = result.original_text || result.data ? .original_text || '';
                    summaryInput.value = result.summary || result.data ? .summary || '';
                    settingsInput.value = result.settings || result.data ? .settings || '';
                    updateStatus('Loaded successfully.');
                } else {
                    updateStatus('Load failed: ' + (result.error || response.statusText));
                }
            } catch (error) {
                updateStatus('Load error: ' + error.message);
            }
        }

        saveBtn.addEventListener('click', saveSession);
        loadBtn.addEventListener('click', loadSession);
    </script>
</body>

</html>
